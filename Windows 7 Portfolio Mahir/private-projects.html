<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>

    <link rel="stylesheet" href="css/apps.css">
    <link rel="icon" type="image/png" href="img/Mahir.jpg"/>

    <style>

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .project-card {
            border: 1px solid #ffcccc;
            border-radius: 6px;
            padding: 15px;
            background: #fff5f5;
            box-shadow: 0 2px 5px rgba(200,0,0,0.05);
            transition: all 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200,0,0,0.15);
            border-color: #cc0000;
        }

        .project-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
            color: #990000;
            word-wrap: break-word;
        }

        .project-lang {
            font-size: 12px;
            color: #660000;
            margin-bottom: 10px;
            display: inline-block;
            background: #ffdddd;
            padding: 3px 7px;
            border-radius: 3px;
            font-weight: 500;
        }

        .project-desc {
            font-size: 13px;
            color: #440000;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .project-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .project-link {
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #cc0000;
            text-decoration: none;
            font-weight: 500;
        }

        .project-link:hover {
            color: #ff0000;
            text-decoration: underline;
        }

        .project-link svg {
            width: 14px;
            height: 14px;
        }

        h1 {
            color: #990000;
        }

        .warn-banner {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 720px) {

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .project-card {
                padding: 12px;
            }
        }

        /* Modal */

        #joke-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.45);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .joke-box {
            background: #fff;
            border: 1px solid #999;
            border-radius: 5px;
            width: 380px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .joke-title {
            background: linear-gradient(to bottom, #ffebeb 0%, #ffcccc 100%);
            padding: 8px 10px;
            font-weight: bold;
            font-size: 13px;
            color: #990000;
            border-bottom: 1px solid #cc0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .joke-content {
            padding: 20px;
            font-size: 13px;
            color: #333;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            white-space: pre-wrap;
        }

        .btn-ok {
            margin: 0 10px 10px auto;
            display: block;
            padding: 6px 20px;
            border: 1px solid #cc0000;
            background: linear-gradient(to bottom, #fff5f5 0%, #ffebeb 100%);
            color: #990000;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-ok:hover {
            background: #ffcccc;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="warn-banner">

            <svg viewBox="0 0 24 24"
                 width="18"
                 height="18"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2">

                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>

                <line x1="12" y1="9" x2="12" y2="13"></line>

                <line x1="12" y1="17" x2="12.01" y2="17"></line>

            </svg>

            CONFIDENTIAL: PRIVATE REPOSITORIES

        </div>

        <h1>My Private Projects</h1>

        <p>
            A collection of my private GitHub repositories.
            These projects are currently private, but live demos are publicly available.
        </p>

        <div class="projects-grid" id="projects-container"></div>

    </div>

    <!-- Modal -->

    <div id="joke-modal">

        <div class="joke-box">

            <div class="joke-title">

                <span>Windows Security Alert</span>

                <span style="cursor:pointer;" onclick="closeJoke()">X</span>

            </div>

            <div class="joke-content">

                <svg viewBox="0 0 24 24"
                     width="36"
                     height="36"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">

                    <circle cx="12"
                            cy="12"
                            r="10"
                            fill="#e04040"
                            stroke="none"></circle>

                    <line x1="15"
                          y1="9"
                          x2="9"
                          y2="15"
                          stroke="#fff"
                          stroke-width="2"></line>

                    <line x1="9"
                          y1="9"
                          x2="15"
                          y2="15"
                          stroke="#fff"
                          stroke-width="2"></line>

                </svg>

                <div id="joke-msg"></div>

            </div>

            <button class="btn-ok" onclick="closeJoke()">
                I Understand
            </button>

        </div>

    </div>

    <script>

        const projects = [

            {
                name: "Nakla Sherpur Blood Bank",
                lang: "Html • CSS • Tailwind CSS • Javascript • Firebase",
                desc: "Emergency blood donor platform helping people quickly find nearby blood donors.",
                url: "https://nakla-sherpur-blood-bank.vercel.app/"
            },

            {
                name: "Polytechnic AI",
                lang: "Html • CSS • Tailwind CSS • Javascript • AI Integration • Firebase",
                desc: "AI-powered learning assistant built specifically for polytechnic students.",
                url: "https://polytechnic-ai.vercel.app/"
            },

            {
                name: "Polytechnic Cover Page Generator",
                lang: "Html • CSS • Javascript",
                desc: "Online tool for generating printable assignment and job cover pages instantly.",
                url: "https://cover-page-generator-gold.vercel.app/"
            },

            {
                name: "Bajar List App",
                lang: "React • Vite • Capacitor • Tailwind CSS • Local Storage • Android Studio",
                desc: "Smart shopping list application with categorized grocery management.",
                url: "https://bajar-list-app.vercel.app/"
            },

            {
                name: "Amar Hisab",
                lang: "React • Vite • Capacitor • Tailwind CSS • Local Storage • Android Studio",
                desc: "Offline-first expense tracker application for daily finance management.",
                url: "https://amar-hisab-app.vercel.app/"
            },

            {
                name: "Mahir Resize",
                lang: "Html • CSS • Javascript",
                desc: "Privacy-focused image resize, compress, crop and convert tool.",
                url: "https://mahir-resize.vercel.app/"
            },

            {
                name: "MN Media",
                lang: "Html • CSS • Javascript",
                desc: "Modern digital agency website focused on development and design services.",
                url: "https://mn-media.vercel.app/"
            }

        ];

        const container = document.getElementById("projects-container");

        projects.forEach((proj) => {

            const card = document.createElement("div");

            card.className = "project-card";

            card.innerHTML = `
                <div class="project-title">${proj.name}</div>

                <div class="project-lang">
                    ${proj.lang}
                </div>

                <div class="project-desc">
                    ${proj.desc}
                </div>

                <div class="project-actions">

                    <a href="#"
                       class="project-link private-btn">

                        <svg viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2">

                            <rect x="3"
                                  y="11"
                                  width="18"
                                  height="11"
                                  rx="2"
                                  ry="2"></rect>

                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>

                        </svg>

                        Private Repository

                    </a>

                    <a href="${proj.url}"
                       target="_blank"
                       class="project-link">

                        <svg viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2">

                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>

                            <polyline points="15 3 21 3 21 9"></polyline>

                            <line x1="10"
                                  y1="14"
                                  x2="21"
                                  y2="3"></line>

                        </svg>

                        Visit Website

                    </a>

                </div>
            `;

            const privateBtn = card.querySelector(".private-btn");

            privateBtn.addEventListener("click", function(e) {

                e.preventDefault();

                openJoke();

            });

            container.appendChild(card);

        });

        const messages = [

            "ACCESS DENIED.\n\nThis repository is private.",

            "SECURITY ALERT.\n\nYou do not have permission to access this repository.",

            "PRIVATE SOURCE CODE DETECTED.\n\nAccess blocked successfully.",

            "Nice try.\n\nBut these repositories are locked."

        ];

        function openJoke() {

            const randomMessage =
                messages[Math.floor(Math.random() * messages.length)];

            document.getElementById("joke-msg").innerText =
                randomMessage;

            document.getElementById("joke-modal").style.display =
                "flex";
        }

        function closeJoke() {

            document.getElementById("joke-modal").style.display =
                "none";
        }

        // ── Source Code Inspect Block js code ────────

document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.key == 'u') || (e.ctrlKey && e.shiftKey && e.key == 'I')) {
                return false;
              }
            }
            
    </script>

</body>
</html>
