<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Projects</title>

    <link rel="stylesheet" href="css/apps.css">
    <link rel="icon" type="image/png" href="img/Mahir.jpg"/>

    <style>

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .project-card {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 15px;
            background: #f9f9f9;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-color: #0066cc;
        }

        .project-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 6px;
            color: #003366;
            word-wrap: break-word;
        }

        .project-lang {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            display: inline-block;
            background: #eee;
            padding: 3px 7px;
            border-radius: 3px;
        }

        .project-desc {
            font-size: 13px;
            color: #444;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .project-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .project-link {
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }

        .project-link:hover {
            color: #004499;
            text-decoration: underline;
        }

        .project-link svg {
            width: 14px;
            height: 14px;
        }

        @media (max-width: 720px) {

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .project-card {
                padding: 12px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>My Projects</h1>

        <p>
            Most of my projects are set to private so stop judging 😄
        </p>

        <div class="projects-grid" id="projects-container"></div>

    </div>

    <script>

        const projects = [

            {
                name: "Portfolio-Win7",
                lang: "HTML • CSS • JavaScript",
                desc: "A fully interactive Windows 7 inspired portfolio operating system experience running directly inside the browser.",
                github: "https://github.com/dev-mahir-ahmed/Win7-Portfolio",
                live: "https://mahir-win7-portfolio.vercel.app/"
            }
        ];

        const container =
            document.getElementById("projects-container");

        projects.forEach((proj) => {

            const card =
                document.createElement("div");

            card.className =
                "project-card";

            card.innerHTML = `

                <div class="project-title">
                    ${proj.name.replace(/-/g, ' ')}
                </div>

                <div class="project-lang">
                    ${proj.lang}
                </div>

                <div class="project-desc">
                    ${proj.desc}
                </div>

                <div class="project-buttons">

                    <a href="${proj.github}"
                       target="_blank"
                       class="project-link">

                        <svg viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2">

                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>

                        </svg>

                        GitHub

                    </a>

                    ${proj.live ? `

                    <a href="${proj.live}"
                       target="_blank"
                       class="project-link">

                        <svg viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2">

                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>

                            <polyline points="15 3 21 3 21 9"></polyline>

                            <line x1="10"
                                  y1="14"
                                  x2="21"
                                  y2="3"></line>

                        </svg>

                        Live Demo

                    </a>

                    ` : ''}

                </div>

            `;

            container.appendChild(card);

        });
        // ── Source Code Inspect Block js code ────────

document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.key == 'u') || (e.ctrlKey && e.shiftKey && e.key == 'I')) {
                return false;
              }
            }
    </script>

</body>
</html>
