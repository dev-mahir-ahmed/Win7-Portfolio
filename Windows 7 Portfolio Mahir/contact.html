<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="css/apps.css">

    <style>
        body{
            margin:0;
            padding:0;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:#ffffff;
        }

        .contact-container{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            padding:20px;
            box-sizing:border-box;
        }

        .contact-card{
            width:100%;
            max-width:420px;
            background:#f9f9f9;
            border:1px solid #dcdcdc;
            border-radius:10px;
            padding:35px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            text-align:center;
        }

        .contact-card h1{
            margin-top:0;
            margin-bottom:10px;
            color:#003399;
            font-size:28px;
        }

        .contact-card p{
            color:#666;
            margin-bottom:30px;
            font-size:14px;
            line-height:1.6;
        }

        .btn{
            display:flex;
            align-items:center;
            justify-content:center;
            width:100%;
            padding:13px 20px;
            margin:14px 0;
            border-radius:6px;
            font-weight:600;
            font-size:15px;
            text-decoration:none;
            transition:all 0.25s ease;
            color:#fff !important;
            box-sizing:border-box;
        }

        .btn svg{
            width:20px;
            height:20px;
            margin-right:10px;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        /* GitHub Button */
        .btn-github{
            background:#24292e;
        }

        .btn-github:hover{
            background:#111;
        }

        /* Website Button */
        .btn-website{
            background:linear-gradient(135deg, #005a9e 0%, #003366 100%);
        }

        .btn-website:hover{
            background:linear-gradient(135deg, #004680 0%, #002244 100%);
        }

        .footer-text{
            margin-top:20px;
            font-size:12px;
            color:#888;
        }
    </style>

    <link rel="icon" type="image/png" href="img/Mahir.jpg"/>
</head>
